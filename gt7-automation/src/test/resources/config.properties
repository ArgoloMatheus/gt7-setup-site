# ──────────────────────────────────────────────────────────────────
# ARQUIVO DE CONFIGURAÇÃO DO AMBIENTE
#
# Por que usar .properties em vez de hardcode no código?
# - Permite trocar de ambiente (local/staging/prod) sem alterar o código
# - Em pipelines de CI/CD, estas variáveis são sobrescritas por variáveis
#   de ambiente do servidor — nunca commite senhas aqui em projetos reais!
# ──────────────────────────────────────────────────────────────────

# URL do site. Trocar para o GitHub Pages quando fizer deploy.
base.url=https://argolamatheus.github.io/gt7-setup-site

# Navegador padrão. Valores aceitos: chrome | firefox | edge
browser=chrome

# Rodar sem abrir janela do navegador (útil em servidores de CI sem interface gráfica)
headless=false

# Tempo máximo de espera por elementos (segundos)
explicit.wait=10
implicit.wait=5

# Resolução da janela do navegador
browser.width=1440
browser.height=900
